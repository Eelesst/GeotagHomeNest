<!DOCTYPE html>
<html>
<head><title>EXIF Test</title></head>
<body>
<h1>EXIF Test Results</h1>
<pre id="output" style="font-size:14px; background:#111; color:#0f0; padding:20px;"></pre>

<script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js"></script>
<script>
const log = (msg) => {
  document.getElementById('output').textContent += msg + '\n';
  console.log(msg);
};

// Create test JPEG via canvas
const canvas = document.createElement('canvas');
canvas.width = 100;
canvas.height = 100;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#FF0000';
ctx.fillRect(0, 0, 100, 100);
const testDataURL = canvas.toDataURL('image/jpeg', 0.9);
log('Canvas JPEG created: ' + testDataURL.substring(0, 40) + '...');
log('');

// Test 1: Basic EXIF
log('=== TEST 1: Basic EXIF (ImageDescription + Artist + Copyright) ===');
try {
  const obj = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {}, 'Interop': {} };
  obj['0th'][piexif.ImageIFD.ImageDescription] = 'Test Title';
  obj['0th'][piexif.ImageIFD.Artist] = 'Test Author';
  obj['0th'][piexif.ImageIFD.Copyright] = 'Test Copyright';
  const str = piexif.dump(obj);
  log('  dump() OK, length: ' + str.length);
  const result = piexif.insert(str, testDataURL);
  log('  insert() OK, result length: ' + result.length);
  const v = piexif.load(result);
  log('  Title readback: ' + v['0th'][piexif.ImageIFD.ImageDescription]);
  log('  Artist readback: ' + v['0th'][piexif.ImageIFD.Artist]);
  log('  ✅ TEST 1 PASSED');
} catch (e) {
  log('  ❌ TEST 1 FAILED: ' + e.message);
}
log('');

// Test 2: XP Tags (Windows metadata)
log('=== TEST 2: XP Tags (40091-40095) ===');
const encUTF16 = (s) => {
  const b = [];
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    b.push(c & 0xFF);
    b.push((c >> 8) & 0xFF);
  }
  b.push(0, 0);
  return b;
};
try {
  const obj2 = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {}, 'Interop': {} };
  obj2['0th'][piexif.ImageIFD.ImageDescription] = 'XP Test';
  obj2['0th'][40091] = encUTF16('XP Title');
  obj2['0th'][40092] = encUTF16('XP Comment');
  obj2['0th'][40093] = encUTF16('XP Author');
  obj2['0th'][40094] = encUTF16('tag1; tag2');
  obj2['0th'][40095] = encUTF16('XP Subject');
  const str2 = piexif.dump(obj2);
  log('  dump() OK, length: ' + str2.length);
  const result2 = piexif.insert(str2, testDataURL);
  log('  insert() OK');
  const v2 = piexif.load(result2);
  log('  XPTitle present: ' + (v2['0th'][40091] ? 'YES' : 'NO'));
  log('  XPKeywords present: ' + (v2['0th'][40094] ? 'YES' : 'NO'));
  log('  ✅ TEST 2 PASSED');
} catch (e) {
  log('  ❌ TEST 2 FAILED: ' + e.message);
}
log('');

// Test 3: Rating tag 18246
log('=== TEST 3: Rating tag (18246) ===');
try {
  const obj3 = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {}, 'Interop': {} };
  obj3['0th'][piexif.ImageIFD.ImageDescription] = 'Rating Test';
  obj3['0th'][18246] = 5;
  const str3 = piexif.dump(obj3);
  log('  dump() OK');
  const result3 = piexif.insert(str3, testDataURL);
  log('  insert() OK');
  log('  ✅ TEST 3 PASSED');
} catch (e) {
  log('  ❌ TEST 3 FAILED: ' + e.message);
}
log('');

// Test 4: Rating tag 18249
log('=== TEST 4: RatingPercent tag (18249) ===');
try {
  const obj4 = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {}, 'Interop': {} };
  obj4['0th'][18249] = 99;
  const str4 = piexif.dump(obj4);
  log('  ✅ TEST 4 PASSED');
} catch (e) {
  log('  ❌ TEST 4 FAILED: ' + e.message);
}
log('');

// Test 5: ALL tags combined
log('=== TEST 5: ALL tags combined (XP + Rating + GPS) ===');
try {
  const obj5 = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {}, 'Interop': {} };
  obj5['0th'][piexif.ImageIFD.ImageDescription] = 'Full Test';
  obj5['0th'][piexif.ImageIFD.Artist] = 'Author';
  obj5['0th'][piexif.ImageIFD.Copyright] = 'Copyright';
  obj5['0th'][40091] = encUTF16('Full Title');
  obj5['0th'][40092] = encUTF16('Full Comment');
  obj5['0th'][40093] = encUTF16('Full Author');
  obj5['0th'][40094] = encUTF16('tag1; tag2; tag3');
  obj5['0th'][40095] = encUTF16('Full Subject');
  obj5['0th'][18246] = 5;
  obj5['0th'][18249] = 99;
  obj5['GPS'][piexif.GPSIFD.GPSVersionID] = [2, 3, 0, 0];
  obj5['GPS'][piexif.GPSIFD.GPSLatitudeRef] = 'N';
  obj5['GPS'][piexif.GPSIFD.GPSLatitude] = piexif.GPSHelper.degToDmsRational(21.0285);
  obj5['GPS'][piexif.GPSIFD.GPSLongitudeRef] = 'E';
  obj5['GPS'][piexif.GPSIFD.GPSLongitude] = piexif.GPSHelper.degToDmsRational(105.8542);
  const str5 = piexif.dump(obj5);
  log('  dump() OK, length: ' + str5.length);
  const result5 = piexif.insert(str5, testDataURL);
  log('  insert() OK, result length: ' + result5.length);
  log('  ✅ TEST 5 PASSED');
} catch (e) {
  log('  ❌ TEST 5 FAILED: ' + e.message);
}
log('');
log('===== ALL TESTS COMPLETE =====');
</script>
</body>
</html>
